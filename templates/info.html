<style>
    /* Light / Dark aware — respects system preference */
    .info-card {
        max-width: 800px;
        margin: 2rem auto;
        padding: 1.5rem 2rem;
        background: var(--bg-surface, #ffffff);
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        color: var(--text-primary, #1a1a2e);
    }
    @media (prefers-color-scheme: dark) {
        .info-card {
            background: #1e1e2e;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            color: #e0e0e0;
        }
        .info-card h1, .info-card h2 {
            color: #ffffff;
            border-bottom-color: #444;
        }
        .info-card h3 {
            color: #cccccc;
        }
        .info-table {
            background: #1e1e2e;
        }
        .info-table th, .info-table td {
            border-color: #444;
        }
        .info-table th {
            background: #2a2a3a;
            color: #ffffff;
        }
        .info-table td {
            color: #e0e0e0;
        }
        .closing-card {
            background: #2a2a3a;
        }
        .info-card strong {
            color: #ffffff;
        }
    }
</style>
