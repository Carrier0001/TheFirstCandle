services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vow
      POSTGRES_USER: vow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema_v1.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vow"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://vow:${DB_PASSWORD:-changeme123}@postgres:5432/vow
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-prod}
      PHONE_SALT: ${PHONE_SALT:-phone-salt-change-in-prod}
      IP_SALT: ${IP_SALT:-ip-salt-change-in-prod}
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./evidence:/app/evidence
      - ./templates:/app/templates
      - ./static:/app/static
    restart: unless-stopped

volumes:
  postgres_data: