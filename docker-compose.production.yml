version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vow_postgres
    environment:
      POSTGRES_DB: vow
      POSTGRES_USER: vow
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema_v1.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./backups:/backups
    networks:
      - vow_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # read_only must be false for Postgres
    read_only: false
    tmpfs:
      - /tmp
      - /var/run/postgresql

  api:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: vow_api
    ports:
      - "127.0.0.1:8000:8000"   # Only accessible via nginx
    environment:
      DATABASE_URL: postgresql://vow@postgres:5432/vow
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      PHONE_SALT_FILE: /run/secrets/phone_salt
      IP_SALT_FILE: /run/secrets/ip_salt
      ENVIRONMENT: production
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    secrets:
      - db_password
      - jwt_secret
      - phone_salt
      - ip_salt
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - evidence_storage:/app/evidence:rw
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
    networks:
      - vow_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  backup:
    image: postgres:15-alpine
    container_name: vow_backup
    secrets:
      - db_password
    environment:
      PGHOST: postgres
      PGUSER: vow
      PGDATABASE: vow
    volumes:
      - ./backups:/backups
      - postgres_data:/var/lib/postgresql/data:ro
    networks:
      - vow_internal
    command: >
      sh -c "while true; do
        echo '[Backup] Starting at $$(date)';
        PGPASSWORD=$$(cat /run/secrets/db_password) pg_dump -U vow -Fc -d vow > /backups/vow_$$(date +%Y%m%d_%H%M%S).dump;
        find /backups -name '*.dump' -mtime +7 -delete;
        echo '[Backup] Completed at $$(date)';
        sleep 86400;
      done"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: vow_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./static:/usr/share/nginx/html/static:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - vow_internal
    depends_on:
      - api
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  phone_salt:
    file: ./secrets/phone_salt.txt
  ip_salt:
    file: ./secrets/ip_salt.txt

volumes:
  postgres_data:
  evidence_storage:
  nginx_cache:

networks:
  vow_internal:
    driver: bridge
    internal: true
