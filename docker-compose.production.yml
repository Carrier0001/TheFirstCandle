# PRODUCTION DOCKER COMPOSE
# Security-hardened configuration
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vow_postgres
    environment:
      POSTGRES_DB: vow
      POSTGRES_USER: vow
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema_v1.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./backups:/backups
    # DO NOT EXPOSE PORT IN PRODUCTION
    # ports:
    #   - "5432:5432"
    networks:
      - vow_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql

  api:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: vow_api
    ports:
      - "127.0.0.1:8000:8000"  # Only localhost access (behind reverse proxy)
    environment:
      DATABASE_URL: postgresql://vow@postgres:5432/vow?password_file=/run/secrets/db_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      PHONE_SALT_FILE: /run/secrets/phone_salt
      IP_SALT_FILE: /run/secrets/ip_salt
      ENVIRONMENT: production
      PYTHONUNBUFFERED: 1
    secrets:
      - db_password
      - jwt_secret
      - phone_salt
      - ip_salt
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - evidence_storage:/app/evidence:rw
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
    networks:
      - vow_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Automated backups
  backup:
    image: postgres:15-alpine
    container_name: vow_backup
    environment:
      PGPASSWORD_FILE: /run/secrets/db_password
      PGHOST: postgres
      PGUSER: vow
      PGDATABASE: vow
    secrets:
      - db_password
    volumes:
      - ./backups:/backups
      - postgres_data:/var/lib/postgresql/data:ro
    networks:
      - vow_internal
    command: >
      sh -c "while true; do
        sleep 86400;
        pg_dump -Fc > /backups/vow_$$(date +%Y%m%d_%H%M%S).dump;
        find /backups -name '*.dump' -mtime +7 -delete;
        echo 'Backup completed at $$(date)';
      done"
    restart: unless-stopped

  # Nginx reverse proxy with rate limiting
  nginx:
    image: nginx:alpine
    container_name: vow_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./static:/usr/share/nginx/html/static:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - vow_internal
    depends_on:
      - api
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  phone_salt:
    file: ./secrets/phone_salt.txt
  ip_salt:
    file: ./secrets/ip_salt.txt

volumes:
  postgres_data:
    driver: local
  evidence_storage:
    driver: local
  nginx_cache:
    driver: local

networks:
  vow_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
