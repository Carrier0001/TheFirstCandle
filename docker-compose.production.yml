# docker-compose.production.yml
version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=WARNING
      - RATE_LIMIT_ENABLED=true
      - SUBMISSION_COOLDOWN=3600
      - MAX_REQUESTS_PER_IP=100
    deploy:
      mode: replicated
      replicas: 3
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vow.rule=Host(`api.vow.ledger`)"
      - "traefik.http.services.vow.loadbalancer.server.port=8000"

  # Load Balancer
  traefik:
    image: traefik:v3.0
    container_name: vow_traefik
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml
      - ./config/traefik/certs:/certs
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    networks:
      - vow_network
    restart: unless-stopped

networks:
  vow_network:
    external: true
